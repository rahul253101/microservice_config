server:
 port: 8072

spring:
 security:
  oauth2:
   resourceserver:
    jwt:
     jwk-set-uri: "http://localhost:7080/realms/master/protocol/openid-connect/certs"

eureka:
 instance:
  preferIpAddress: true
 client:
  registerWithEureka: true
  fetchRegistry: true
  serviceUrl:
   defaultZone: "http://localhost:8070/eureka/"
 
